<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AEO Visibility Audit</title>
  <style>
    :root {
      --bg:#07090f; --card:#111520; --border:#253047; --text:#edf0f7;
      --muted:#8d96ad; --accent:#3d7fff; --success:#1fba74; --error:#e05a5a;
    }
    * { box-sizing: border-box; }
    body {
      margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
      background: radial-gradient(circle at top, #111b32 0%, var(--bg) 55%);
      color:var(--text); font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding:20px;
    }
    .card {
      width:100%; max-width:560px; background:linear-gradient(180deg, var(--card), #0b0e14);
      border:1px solid var(--border); border-radius:16px; padding:28px;
      box-shadow:0 25px 80px rgba(0,0,0,.45);
    }
    h1 { margin:0 0 8px; font-size:24px; }
    p { margin:0 0 22px; color:var(--muted); }
    label { display:block; margin:16px 0 7px; font-size:13px; color:var(--muted); }
    input, select {
      width:100%; padding:13px 14px; border-radius:10px; border:1px solid var(--border);
      background:#07090f; color:var(--text); font-size:15px;
    }
    .models { display:flex; gap:14px; margin-top:8px; }
    .models label { margin:0; color:var(--text); display:flex; gap:8px; align-items:center; }
    .models input { width:auto; }
    button {
      margin-top:22px; width:100%; padding:14px; border:0; border-radius:10px;
      background:linear-gradient(180deg, var(--accent), #255fcc); color:white;
      font-weight:700; cursor:pointer; font-size:15px;
    }
    button:disabled { opacity:.6; cursor:not-allowed; }
    .msg { margin-top:16px; padding:12px; border-radius:10px; display:none; white-space:pre-line; }
    .ok { display:block; background:rgba(31,186,116,.12); color:var(--success); border:1px solid rgba(31,186,116,.35); }
    .err { display:block; background:rgba(224,90,90,.12); color:var(--error); border:1px solid rgba(224,90,90,.35); }
    .hint { font-size:12px; margin-top:14px; color:var(--muted); }
  </style>
</head>
<body>
  <main class="card">
    <h1>AEO Visibility Audit</h1>
    <p>Στείλε URL επιχείρησης στο n8n workflow.</p>

    <form id="auditForm">
      <label for="businessName">Όνομα επιχείρησης *</label>
      <input id="businessName" name="business_name" placeholder="π.χ. Sani Resort" required />

      <label for="pageUrl">URL επιχείρησης *</label>
      <input id="pageUrl" name="url" type="url" placeholder="https://sani-resort.com" required />

      <label for="competitorName">Όνομα ανταγωνιστή</label>
      <input id="competitorName" name="competitor_name" placeholder="προαιρετικό" />

      <label for="competitorUrl">URL ανταγωνιστή</label>
      <input id="competitorUrl" name="competitor_url" type="url" placeholder="προαιρετικό" />

      <label for="language">Γλώσσα</label>
      <select id="language" name="language">
        <option value="el">Ελληνικά</option>
        <option value="en">English</option>
        <option value="both">Και τα δύο</option>
      </select>

      <label>Μοντέλα</label>
      <div class="models">
        <label><input type="checkbox" name="models" value="chatgpt" checked /> ChatGPT</label>
        <label><input type="checkbox" name="models" value="claude" /> Claude</label>
      </div>

      <button id="submitBtn" type="submit">Εκκίνηση ελέγχου</button>
      <div id="message" class="msg"></div>
      <div class="hint">Για test mode: στο n8n πρέπει να έχεις πατήσει “Listen for test event”.</div>
    </form>
  </main>

<script>
const WEBHOOK = 'https://n8n-service-t3n0.onrender.com/webhook/aeo-audit';

const form = document.getElementById('auditForm');
const button = document.getElementById('submitBtn');
const message = document.getElementById('message');

function show(type, text) {
  message.className = 'msg ' + type;
  message.textContent = text;
}

function normalizeUrl(value) {
  const v = value.trim();
  if (!v) return '';
  if (/^https?:\/\//i.test(v)) return v;
  return 'https://' + v;
}

form.addEventListener('submit', async (event) => {
  event.preventDefault();

  const models = Array.from(document.querySelectorAll('input[name="models"]:checked')).map(x => x.value);
  if (!models.length) {
    show('err', 'Επίλεξε τουλάχιστον ένα μοντέλο.');
    return;
  }

  const payload = {
    run_id: new Date().toISOString(),
    business_name: document.getElementById('businessName').value.trim(),
    url: normalizeUrl(document.getElementById('pageUrl').value),
    competitor_name: document.getElementById('competitorName').value.trim() || null,
    competitor_url: normalizeUrl(document.getElementById('competitorUrl').value) || null,
    language: document.getElementById('language').value,
    models,
    submitted_at: new Date().toISOString()
  };

  button.disabled = true;
  button.textContent = 'Στέλνεται...';
  show('ok', 'Στέλνω το request στο n8n...');

  try {
    await fetch(WEBHOOK, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
      body: JSON.stringify(payload)
    });

    show('ok', '✓ Το request στάλθηκε. Έλεγξε το n8n Webhook node.');
    form.reset();
    document.querySelector('input[name="models"][value="chatgpt"]').checked = true;
  } catch (error) {
    show('err', '✗ Δεν στάλθηκε το request.\n' + error.message);
  } finally {
    button.disabled = false;
    button.textContent = 'Εκκίνηση ελέγχου';
  }
});
</script>
</body>
</html>
